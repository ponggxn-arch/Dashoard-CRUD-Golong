{{define "content"}}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">
                    <i class="bi bi-folder"></i> จัดการหมวดหมู่สินค้า
                </h4>
                <a href="/categories/add" class="btn btn-light">
                    <i class="bi bi-plus-circle"></i> เพิ่มหมวดหมู่ใหม่
                </a>
            </div>
            <div class="card-body">
                {{if .}}
                <div class="table-responsive">
                    <table class="table table-hover table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th width="10%">ID</th>
                                <th width="25%">ชื่อหมวดหมู่</th>
                                <th width="45%">รายละเอียด</th>
                                <th width="15%">วันที่สร้าง</th>
                                <th width="15%" class="text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{range .}}
                            <tr>
                                <td><span class="badge bg-info">{{.ID}}</span></td>
                                <td><strong>{{.Name}}</strong></td>
                                <td>{{.Description}}</td>
                                <td>{{.CreatedAt.Format "02/01/2006"}}</td>
                                <td class="text-center">
                                    <div class="btn-group" role="group">
                                        <a href="/categories/edit?id={{.ID}}" class="btn btn-sm btn-warning" title="แก้ไข">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <button class="btn btn-sm btn-danger delete-btn" data-category-id="{{.ID}}" title="ลบ">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>
                {{else}}
                <div class="alert alert-info text-center">
                    <i class="bi bi-info-circle"></i> ยังไม่มีหมวดหมู่สินค้า คลิก "เพิ่มหมวดหมู่ใหม่" เพื่อสร้าง
                </div>
                {{end}}
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.delete-btn').forEach(button => {
        button.addEventListener('click', function() {
            const id = this.getAttribute('data-category-id');
            deleteCategory(id);
        });
    });
});

function deleteCategory(id) {
    Swal.fire({
        title: 'ยืนยันการลบ?',
        text: "หมวดหมู่นี้จะถูกลบถาวร (ถ้าไม่มีสินค้าในหมวดหมู่)",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'ใช่, ลบเลย!',
        cancelButtonText: 'ยกเลิก'
    }).then((result) => {
        if (result.isConfirmed) {
            fetch('/categories/delete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'id=' + id
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'ลบแล้ว!',
                        text: 'หมวดหมู่ถูกลบเรียบร้อย',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.reload();
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'ไม่สามารถลบได้!',
                        text: data.message || 'หมวดหมู่นี้กำลังถูกใช้งานโดยสินค้า'
                    });
                }
            })
            .catch(error => {
                Swal.fire({
                    icon: 'error',
                    title: 'ข้อผิดพลาด!',
                    text: 'ไม่สามารถลบหมวดหมู่ได้'
                });
            });
        }
    });
}
</script>
{{end}}
