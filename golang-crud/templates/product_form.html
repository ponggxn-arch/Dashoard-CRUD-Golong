{{define "content"}}
<div class="row">
    <div class="col-md-10 offset-md-1">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    {{if eq .Action "add"}}
                    <i class="bi bi-plus-circle"></i> เพิ่มสินค้าใหม่
                    {{else}}
                    <i class="bi bi-pencil"></i> แก้ไขข้อมูลสินค้า
                    {{end}}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{if eq .Action "add"}}/products/create{{else}}/products/update{{end}}">
                    {{if eq .Action "edit"}}
                    <input type="hidden" name="id" value="{{.Product.ID}}">
                    {{end}}

                    <div class="row">
                        <!-- Column 1 -->
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-upc"></i> รหัสสินค้า <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="code" value="{{.Product.Code}}" required>
                                <small class="text-muted">เช่น: PRD-001</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-tag"></i> ชื่อสินค้า <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="name" value="{{.Product.Name}}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-folder"></i> หมวดหมู่</label>
                                <select class="form-select" name="category_id">
                                    <option value="">-- ไม่ระบุ --</option>
                                    {{range .Categories}}
                                    <option value="{{.ID}}" {{if eq $.Product.CategoryID .ID}}selected{{end}}>{{.Name}}</option>
                                    {{end}}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-card-text"></i> รายละเอียด</label>
                                <textarea class="form-control" name="description" rows="3">{{.Product.Description}}</textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-rulers"></i> หน่วยนับ <span class="text-danger">*</span></label>
                                <select class="form-select" name="unit" required>
                                    <option value="ชิ้น" {{if eq .Product.Unit "ชิ้น"}}selected{{end}}>ชิ้น</option>
                                    <option value="กล่อง" {{if eq .Product.Unit "กล่อง"}}selected{{end}}>กล่อง</option>
                                    <option value="แพ็ค" {{if eq .Product.Unit "แพ็ค"}}selected{{end}}>แพ็ค</option>
                                    <option value="รีม" {{if eq .Product.Unit "รีม"}}selected{{end}}>รีม</option>
                                    <option value="กระสอบ" {{if eq .Product.Unit "กระสอบ"}}selected{{end}}>กระสอบ</option>
                                    <option value="ลัง" {{if eq .Product.Unit "ลัง"}}selected{{end}}>ลัง</option>
                                    <option value="ตัว" {{if eq .Product.Unit "ตัว"}}selected{{end}}>ตัว</option>
                                    <option value="อัน" {{if eq .Product.Unit "อัน"}}selected{{end}}>อัน</option>
                                </select>
                            </div>
                        </div>

                        <!-- Column 2 -->
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-currency-dollar"></i> ราคาขาย (บาท) <span class="text-danger">*</span></label>
                                <input type="number" step="0.01" class="form-control" name="price" value="{{.Product.Price}}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-cash"></i> ราคาทุน (บาท)</label>
                                <input type="number" step="0.01" class="form-control" name="cost" value="{{.Product.Cost}}">
                            </div>

                            {{if eq .Action "add"}}
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-box"></i> จำนวนคงเหลือเริ่มต้น</label>
                                <input type="number" class="form-control" name="stock_quantity" value="{{.Product.StockQuantity}}" min="0">
                            </div>
                            {{end}}

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-exclamation-triangle"></i> จำนวนสต็อกขั้นต่ำ <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="min_stock" value="{{if .Product.MinStock}}{{.Product.MinStock}}{{else}}10{{end}}" required>
                                <small class="text-muted">เมื่อสต็อกต่ำกว่านี้จะแจ้งเตือน</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-stack"></i> จำนวนสต็อกสูงสุด</label>
                                <input type="number" class="form-control" name="max_stock" value="{{if .Product.MaxStock}}{{.Product.MaxStock}}{{else}}1000{{end}}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-geo-alt"></i> ตำแหน่งจัดเก็บ</label>
                                <input type="text" class="form-control" name="location" value="{{.Product.Location}}" placeholder="เช่น: A-01, ชั้น 2">
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-upc-scan"></i> บาร์โค้ด</label>
                                <input type="text" class="form-control" name="barcode" value="{{.Product.Barcode}}">
                            </div>

                            {{if eq .Action "edit"}}
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-toggle-on"></i> สถานะ</label>
                                <select class="form-select" name="status">
                                    <option value="active" {{if eq .Product.Status "active"}}selected{{end}}>ใช้งาน</option>
                                    <option value="inactive" {{if eq .Product.Status "inactive"}}selected{{end}}>ไม่ใช้งาน</option>
                                    <option value="discontinued" {{if eq .Product.Status "discontinued"}}selected{{end}}>เลิกจำหน่าย</option>
                                </select>
                            </div>
                            {{end}}
                        </div>
                    </div>

                    <hr>
                    <div class="d-flex justify-content-between">
                        <a href="/products" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> ยกเลิก
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> บันทึก
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{end}}
